    <div class="container">
      <form  id="productForm" method="POST" style="width: 700px; margin: 100px auto;">
        <div class="form-floating mb-3">
          <input type="text" name="ProductName" class="form-control" id="floatingInput" placeholder="Product Name">
          <label for="floatingInput">Product Name</label>
        </div>
        <div class="form-floating mb-3">
          <select name="Category" class="form-select" id="floatingSelectGrid">
            <option value="" selected>Select Category</option>
            <option value="Electric">Electric</option>
            <option value="Clothes">Clothes</option>
            <option value="Furniture">Furniture</option>
          </select>
          <label for="floatingSelectGrid">Select Category from here</label>
        </div>  
        <textarea id="default-editor" class="mb-3" name="description">
          
        </textarea>
        <button id="productBtn" type="submit" class="btn btn-primary me-2">Create Product</button>  
        <button id="editBtn"  type="button" class="btn btn-warning edit-Btn">Edit Product</button>  

      </form>
      <form id="loginForm" method="POST" style="width: 700px; margin: 100px auto;">
        <div class="form-floating mb-3">
          <input type="email" name="email" class="form-control" id="floatingInput" placeholder="name@example.com">
          <label for="floatingInput">Email address</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password">
          <label for="floatingPassword">Password</label>
        </div>
        <button id="loginBtn" type="submit" class="btn btn-primary">Login</button>
        <button id="registerBtn" type="submit" class="btn btn-primary ms-2">Register</button>
      </form>
    </div>
