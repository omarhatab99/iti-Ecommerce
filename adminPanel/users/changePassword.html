<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>user profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="/css/public.css">
    <link rel="stylesheet" href="assets/css/users.css">
</head>
<body>
    <!-- start loading -->
    <div class="overlay-loading">
        <img src="/images/loading.gif" width="70" />
    </div>
    <!-- start header -->
    <section id="header" class="header">
        <!-- start navbar -->
        <nav class="navbar px-3">
            <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="#">
                <img src="assets/images/logo.png" alt="logo" width="35"/>
                <span style="font-size: 20px; font-weight: bold;">Omar</span>
                <span style="font-size: 20px; font-weight: bold; color: #f46060;">Prog</span>
            </a>
                <div class="dashboard-details-container ms-auto px-4 d-flex justify-content-center align-items-center">
                    <div class="dark-mode">
                        <span data-mode="light" class="material-icons-sharp active">light_mode</span>
                        <span data-mode="dark" class="material-icons-sharp">dark_mode</span>
                    </div>
                    <div class="dropdown">
                        <!-- here profile details is generated by js if authentication is login -->
                    </div>
                </div>
            </div>
        </nav>
        <!-- end navbar -->
    </section>
    <!-- end header -->
    <div class="container">
        <div class="card p-3">
            <h5 class="card-title d-flex justify-content-between align-items-center">
                <div class="main-title d-flex justify-content-center align-items-center">
                    <span class="main-title-icon me-2">
                        <span class="material-icons-sharp me-1">
                            person
                        </span>
                    </span>
                    Profile Information
                </div>
                <a href="../dashboard/home" class="btn btn-primary btn-sm">back to list</a>
            </h5>   
            <div class="card-body">
                <div class="profile-container">
                    <div class="profile-information">
                        <div class="profile-information-card">
                            <div class="card-img">
                                <img src="assets/images/avatar.png" alt="profile cover">
                            </div>
                            <div class="card-details">
                                <h5 class="profile-username">omar abdelmoniem</h5>
                                <p>Application Developer</p>
                                <span class="profile-role">admin</span>
                            </div>
                        </div>
                        <div class="profile-details">
                            <div class="profile-details-item">
                                <span class="left">Username:</span>
                                <span class="right-username"></span>
                            </div>
                            <div class="profile-details-item">
                                <span class="left">Email:</span>
                                <span class="right-email">omarhatab@gmail.com</span>
                            </div>
                            <div class="profile-details-item">
                                <span class="left">Phone:</span>
                                <span class="right-phone">01004382527</span>
                            </div>
                            <div class="profile-details-item">
                                <span class="left">Created At:</span>
                                <span class="right-createdAt">22/10/2023</span>
                            </div>
                            <div class="profile-details-item">
                                <span class="left">Last Updated At:</span>
                                <span class="right-lastUpdated">22/10/2023</span>
                            </div>
                            <div class="profile-details-item">
                                <span class="left">Role:</span>
                                <span class="right-role">Admin</span>
                            </div>
                        </div>
                    </div>
                    <div class="profile-settings">
                        <form method="post" id="changePasswordForm">
                            <h5>Change Password</h5>
                            <span class="text-danger d-block py-2 px-1" id="changePasswordValidationSpan"></span>
                            <div class="form-floating mb-3">
                                <input type="password" name="CurrentPassword" class="form-control" id="currentPassword" placeholder="current password...">
                                <label for="currentPassword">Current Password</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" name="NewPassword" class="form-control" id="newPassword" placeholder="new password...">
                                <label for="newPassword">New Password</label>
                            </div>
                            <div>
                                <button type="submit" id="changePasswordBtn" class="btn btn-warning" style="margin-top: 245px;">Save changes</button>
                            </div>
                        </form>
                        <div class="style-img">
                            <img src="assets/images/agency.png" alt="profile cover">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="password-verification-alert">
        Password Changed Successfully
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script type="module" src="../shared/layout.js"></script>
    <script type="module" src="assets/js/changePassword.js"></script>
</body>
</html>
