<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>create products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="/css/public.css">
    <link rel="stylesheet" href="assets/css/product.css">
</head>
<body>
    <!-- start loading -->
    <div class="overlay-loading">
        <img src="/images/loading.gif" width="70" />
    </div>
    <!-- start header -->
    <section id="header" class="header">
        <!-- start navbar -->
        <nav class="navbar px-3">
            <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="#">
                <img src="assets/images/logo.png" alt="logo" width="35"/>
                <span style="font-size: 20px; font-weight: bold;">Omar</span>
                <span style="font-size: 20px; font-weight: bold; color: #f46060;">Prog</span>
            </a>
                <div class="dashboard-details-container ms-auto px-4 d-flex justify-content-center align-items-center">
                    <div class="dark-mode">
                        <span data-mode="light" class="material-icons-sharp active">light_mode</span>
                        <span data-mode="dark" class="material-icons-sharp">dark_mode</span>
                    </div>
                    <div class="dropdown">
                        <!-- here profile details is generated by js if authentication is login -->
                    </div>
                </div>  
            </div>
        </nav>
        <!-- end navbar -->
    </section>
    <!-- end header -->
    <div class="container">
        <div class="card p-3">
            <h5 class="card-title d-flex justify-content-between align-items-center">
                <div class="main-title d-flex justify-content-center align-items-center">
                    <span class="main-title-icon me-2">
                        <span class="material-icons-sharp me-1">
                            store
                        </span>
                    </span>
                    Products
                </div>
                <a href="../dashboard/home" class="btn btn-primary btn-sm">back to list</a>
            </h5>   
            <div class="card-body">
                <form method="post" id="productForm">
                    <div class="errorList text-danger py-3 px-1"></div>
                    <div class="row">
                        <div class="col-8 mb-3">
                                <!-- product images -->
                                <div class="upload-card">
                                    <div class="top">
                                        <p>image uploading...</p>
                                        <button type="button">Upload</button>
                                    </div>
                                    <div class="form-upload" class="dragover">
                                        <span class="inner">
                                            upload image here
                                            <span class="select">Browse</span>
                                        </span>
                                        <input type="file" multiple name="Images" id="" class="file">
                                    </div>
                                    <div class="image-container">
                                        <div class="image">
                                            <img src="assets/images/Product-inside.png" alt="image">
                                            <span>&times;</span>
                                        </div>
                                    </div>
                                </div>
                                <!-- <div class="input-group mb-3">
                                    <input type="file" name="Images" multiple="multiple" class="form-control" id="productImages" 
                                    onchange="document.getElementById('previewImg').src = window.URL.createObjectURL(this.files[0])" accept="image/png , image/jpeg , image/jpg">
                                    <label class="input-group-text" for="productImages">Upload Product Images</label>
                                </div> -->
                        </div>
                        <div class="col-4 mb-3">
                            <div class="w-100 img-thumbnail">
                                <img id="previewImg" src="assets/images/Product-inside.png" alt="placeholder" class="w-100" height="350">
                            </div>
                        </div>
                        <div class="col-12">
                            <!-- product name -->
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" name="Name" id="productName" placeholder="Product Name...">
                                <label for="productName">Product Name</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <!-- product category -->
                            <div class="form-floating mb-3">
                                <select class="form-select" id="productCategory" name="Category" aria-label="Choose Product Category...">
                                    <option value="">Select Product Category</option>
                                </select>
                                <label for="productCategory">Choose Product Category...</label>
                            </div>
                        </div>
                        <div class="col-4">
                            <!-- product salary -->
                            <div class="form-floating mb-3">
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" name="Price" id="productPrice" placeholder="Product Price...">
                                    <label for="productName">Product Price</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-4">
                            <!-- product salary -->
                            <div class="form-floating">
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" name="Quantity" id="productQuantity" placeholder="Product Quantity...">
                                    <label for="productName">Product Quantity</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-4">
                            <!-- product salary -->
                            <div class="form-floating">
                                <select class="form-select" id="productColor" name="Color" aria-label="Choose Product Color...">
                                    <option value="">No Color</option>
                                    <option value="White">White</option>
                                    <option value="Black">Black</option>
                                    <option value="Red">Red</option>
                                    <option value="Blue">Blue</option>
                                    <option value="Gold">Gold</option>
                                    <option value="Green">Green</option>
                                </select>
                                <label for="productCategory">Choose Product Color...</label>
                            </div>
                        </div>
                        <div class="col-12 mb-3">
                            <textarea id="default-editor" name="Description">
                            </textarea>
                        </div>

                        <div class="col-12">
                            <button type="submit" id="submitProduct" class="btn btn-primary">Create Product</button>
                        </div>
                    </div>


                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="https://cdn.tiny.cloud/1/6910ovn90iq077vnhrmndo41c1k30nreopfg5cer8jp5195v/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <script type="module" src="../shared/layout.js"></script>
    <script type="module" src="assets/js/create.js"></script>
</body>
</html>
